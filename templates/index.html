{% extends "layout.html" %}
{% block content %}

    <!-- Main Content -->
    <main>
        <!-- Hero Section -->
        <section class="hero">
            <div class="container">
                <div class="hero-content">
                    <div class="hero-text">
                        <p class="hero-greeting">Hello, I'm</p>
                        <h1 class="hero-title">{{params['owner']}} </h1>
                        <p class="hero-subtitle">{{params['work']}}</p>

                        <p class="hero-description">{{params['tagline']}}</p>

                        <div class="hero-buttons">
                            <a href="{{ url_for( 'contact') }}" class="btn btn-primary">Get In Touch</a>
                            <a href="{{ url_for( 'project') }}" class="btn btn-outline">View Work</a>
                        </div>

                        <div class="social-icons">
                            <a href="{{params['github']}}" class="social-icon"><i class="fab fa-github"></i></a>
                            <a href="#" class="social-icon"><i class="fab fa-discord"></i></a>
                            <a href="#" class="social-icon"><i class="fab fa-google"></i></a>
                        </div>
                    </div>

                    <div class="hero-image">
                        <div class="image-container">
                            <img src="https://images.unsplash.com/photo-1666723043169-22e29545675c?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixid=M3w3Nzg4Nzd8MHwxfHNlYXJjaHwxfHxwcm9mZXNzaW9uYWwlMjB3b3Jrc3BhY2UlMjBkZXNrfGVufDF8fHx8MTc3NDA4NzM0Mnww&ixlib=rb-4.1.0&q=80&w=1080" alt="Professional workspace">
                        </div>
                        <div class="blob blob-1"></div>
                        <div class="blob blob-2"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Quick About Section -->
        <section class="section section-light">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title">What I Am</h2>
                    <div class="title-underline"></div>
                </div>

                <div class="features-grid">
                    <div class="feature-card">
                        <div class="feature-icon icon-blue">
                            <i class="fas fa-code"></i>
                        </div>
                        <h3 class="feature-title">Programmer</h3>
                        <p class="feature-description">
                            {{params['about_1']}}
                        </p>
                    </div>

                    <div class="feature-card">
                        <div class="feature-icon icon-purple">
                            <i class="fas fa-palette"></i>
                        </div>
                        <h3 class="feature-title">creative</h3>
                        <p class="feature-description">
                            {{params['about_2']}}
                        </p>
                    </div>

                    <div class="feature-card">
                        <div class="feature-icon icon-yellow">
                            <i class="fa-solid fa-robot"></i>
                        </div>
                        <h3 class="feature-title">AI intermidiate</h3>
                        <p class="feature-description">
                            {{params['about_3']}}
                        </p>
                    </div>
                </div>
            </div>
        </section>
    </main>
{% endblock %}
