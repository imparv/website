<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Portfolio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="nav container">
            <div class="nav-brand">
                <img src="{{ url_for('static', filename='image/favicon.png') }}" class="logo">
                <a href="{{ url_for('home') }}" class="brand-text">About_Me</a>
            </div>

            <!-- Desktop Navigation -->
            <div class="nav-menu" id="navMenu">
                <a href="{{ url_for('home') }}" class="nav-link ">Home</a>
                <a href="{{ url_for('about') }}" class="nav-link ">About</a>
                <a href="{{ url_for( 'services') }}" class="nav-link">Services</a>
                <a href="{{ url_for( 'journey') }}" class="nav-link">Journey</a>
                <a href="{{ url_for( 'project') }}" class="nav-link">Projects</a>
                <a href="{{ url_for( 'blog') }}" class="nav-link">Blog</a>
                <a href="{{ url_for( 'testimonials') }}" class="nav-link">Testimonials</a>
                <a href="{{ url_for( 'contact') }}" class="nav-link">Contact</a>
            </div>

            <!-- Mobile Menu Toggle -->
            <button class="nav-toggle" id="navToggle">
                <i class="fas fa-bars"></i>
            </button>
        </nav>
    </header>

{% block content %}{% endblock %}

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3 class="footer-brand">Portfolio</h3>
                    <p class="footer-text">{{params['quote']}}</p>
                </div>

                <div class="footer-section">
                    <h4 class="footer-title">Quick Links</h4>
                    <ul class="footer-links">
                        <li><a href="{{ url_for('home') }}">Home</a></li>
                        <li><a href="{{ url_for('about') }}">About</a></li>
                        <li><a href="{{ url_for( 'services') }}">Services</a></li>
                        <li><a href="{{ url_for( 'project') }}">Projects</a></li>
                        <li><a href="{{ url_for( 'contact') }}">Contact</a></li>
                    </ul>
                </div>

                <div class="footer-section">
                    <h4 class="footer-title">Connect</h4>
                    <div class="social-links">
                        <a href="{{params['github']}}" class="social-link"><i class="fab fa-github"></i></a>
                        <a href="#" class="social-link"><i class="fab fa-discord"></i></a>
                        <a href="#" class="social-link"><i class="fab fa-spotify"></i></a>
                        <a href="#" class="social-link"><i class="fab fa-google"></i></a>
                    </div>
                </div>
            </div>

            <div class="footer-bottom">
                <p>&copy; {{params['rights']}}</p>
            </div>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
